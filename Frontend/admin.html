<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suite | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="p-4 md:p-12">
    <div id="toast" class="notification">
        <span id="toast-msg"></span>
    </div>

    <div class="max-w-6xl mx-auto space-y-10">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-5xl font-black tracking-tighter text-slate-900">Admin <span class="text-violet-600">Portal</span></h1>
                <p class="text-slate-500 font-bold mt-1 text-sm uppercase tracking-widest">Inventory & Fulfillment Control</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleView()" class="glass px-6 py-3 rounded-2xl font-bold text-violet-600 hover:bg-white hover:shadow-lg transition-all flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
                    <span id="view-btn-text">Listed Products</span>
                </button>
                <a href="index.html" class="glass px-6 py-3 rounded-2xl font-bold text-slate-700 hover:bg-white hover:shadow-lg transition-all flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Storefront
                </a>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                
                <div id="form-container" class="glass p-8 md:p-10 rounded-[40px] shadow-sm space-y-8">
                    <h2 class="text-2xl font-black flex items-center gap-3">
                        <div class="w-10 h-10 bg-violet-100 text-violet-600 rounded-xl flex items-center justify-center">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                        </div>
                        Inventory Entry
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Product Title</label>
                            <input id="p-title" type="text" placeholder="e.g. iPhone 17 Pro Max" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-violet-500 rounded-2xl outline-none font-bold transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Brand Name</label>
                            <input id="p-brand" type="text" placeholder="e.g. Apple, Samsung, Asus" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-violet-500 rounded-2xl outline-none font-bold transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Base Price (USD)</label>
                            <input id="p-price" type="number" step="0.01" placeholder="e.g. 1599.00" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-violet-500 rounded-2xl outline-none font-bold transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Category</label>
                            <select id="p-cat" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-violet-500 rounded-2xl outline-none font-bold transition-all">
                                <option value="Mobiles">Mobiles</option>
                                <option value="Laptops">Laptops</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Furniture">Furniture</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Store Rating (1.0 - 5.0)</label>
                            <input id="p-rating" type="number" step="0.1" value="4.5" placeholder="4.5" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-violet-500 rounded-2xl outline-none font-bold transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Thumbnail URL</label>
                            <input id="p-img" type="text" placeholder="https://image-link.com" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-violet-500 rounded-2xl outline-none font-bold transition-all">
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Product Description</label>
                            <textarea id="p-desc" rows="3" placeholder="Describe the technical specs and highlights..." class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-violet-500 rounded-2xl outline-none font-bold transition-all"></textarea>
                        </div>
                    </div>
                    
                    <button onclick="addProduct()" class="w-full px-10 py-5 bg-violet-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-violet-100 hover:bg-violet-700 hover:scale-[1.01] active:scale-95 transition-all">
                        Sync to Database
                    </button>
                </div>

                <div id="products-list-container" class="hidden glass p-8 md:p-10 rounded-[40px] shadow-sm space-y-8">
                    <h2 class="text-2xl font-black tracking-tight text-slate-900">Live Inventory</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-100">
                                    <th class="pb-4">Product</th>
                                    <th class="pb-4">Category</th>
                                    <th class="pb-4">Price</th>
                                    <th class="pb-4 text-right">Manage</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-list"></tbody>
                        </table>
                    </div>
                </div>

                <div class="glass p-8 md:p-10 rounded-[40px] shadow-sm space-y-8">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-black tracking-tight">Active Shipments</h2>
                        <span class="text-[10px] font-black uppercase bg-violet-100 text-violet-600 px-3 py-1 rounded-full animate-pulse">Live Feed</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-100">
                                    <th class="pb-4 px-2">Order ID</th>
                                    <th class="pb-4">Customer</th>
                                    <th class="pb-4">Bill Amount</th>
                                    <th class="pb-4">Status</th>
                                    <th class="pb-4 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="order-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-8 rounded-[32px] space-y-4">
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Store Revenue</p>
                    <p class="text-4xl font-black text-slate-900">₹8.4M</p>
                    <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div class="w-4/5 h-full bg-vibrant"></div>
                    </div>
                </div>
                <div class="glass p-8 rounded-[32px] space-y-4 border-l-4 border-violet-500">
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">System Status</p>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 bg-emerald-500 rounded-full animate-ping"></div>
                        <span class="font-black text-slate-800">Spring Boot Online</span>
                    </div>
                    <p class="text-xs font-bold text-slate-500">MySQL: suite_db Connected</p>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 z-[2000] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-md">
        <div class="glass w-full max-w-2xl p-8 md:p-10 rounded-[40px] shadow-2xl space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </div>
                    Edit Product
                </h2>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600 transition-all">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <input type="hidden" id="edit-p-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Title</label>
                    <input id="edit-p-title" type="text" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-amber-500 rounded-2xl outline-none font-bold transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Brand</label>
                    <input id="edit-p-brand" type="text" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-amber-500 rounded-2xl outline-none font-bold transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Price</label>
                    <input id="edit-p-price" type="number" step="0.01" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-amber-500 rounded-2xl outline-none font-bold transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Rating</label>
                    <input id="edit-p-rating" type="number" step="0.1" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-amber-500 rounded-2xl outline-none font-bold transition-all">
                </div>
                <div class="space-y-1 md:col-span-2">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Thumbnail URL</label>
                    <input id="edit-p-img" type="text" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-amber-500 rounded-2xl outline-none font-bold transition-all">
                </div>
                <div class="space-y-1 md:col-span-2">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Description</label>
                    <textarea id="edit-p-desc" rows="3" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-amber-500 rounded-2xl outline-none font-bold transition-all"></textarea>
                </div>
            </div>

            <button onclick="updateProduct()" class="w-full px-10 py-5 bg-amber-500 text-white rounded-2xl font-black text-lg shadow-xl shadow-amber-100 hover:bg-amber-600 transition-all">
                Update Database
            </button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
